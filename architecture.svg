<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060810"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="nasGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0f1a30"/>
    </linearGradient>
    <linearGradient id="macGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a1a"/>
      <stop offset="100%" style="stop-color:#0f1f0f"/>
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a2a"/>
      <stop offset="100%" style="stop-color:#1f0f1f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d9ff"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff88"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff8c42"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5b8cff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="url(#bgGrad)"/>

  <!-- Grid overlay (subtle) -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="960" y2="80" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="960" y2="160" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="960" y2="240" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="960" y2="320" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="960" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="960" y2="480" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="560" x2="960" y2="560" stroke="white" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="640" stroke="white" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="640" stroke="white" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="640" stroke="white" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="640" stroke="white" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="640" stroke="white" stroke-width="0.5"/>
    <line x1="840" y1="0" x2="840" y2="640" stroke="white" stroke-width="0.5"/>
