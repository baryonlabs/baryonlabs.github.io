  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" letter-spacing="4" opacity="0.9">OPEN-AGENT-HARNESS — SYSTEM ARCHITECTURE</text>
  <line x1="60" y1="42" x2="400" y2="42" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <line x1="560" y1="42" x2="900" y2="42" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

  <!-- ═══ L0: Tailscale Layer ═══ -->
  <rect x="30" y="580" width="900" height="44" rx="4" fill="#0d1829" stroke="#5b8cff" stroke-width="1" opacity="0.8"/>
  <text x="50" y="596" fill="#5b8cff" font-size="9" font-weight="700" letter-spacing="2">L0</text>
  <text x="72" y="596" fill="#5b8cff" font-size="9" letter-spacing="1">TAILSCALE</text>
  <text x="480" y="600" text-anchor="middle" fill="#8ab4ff" font-size="10" letter-spacing="1">E2E 암호화 메쉬 네트워크 — 100.x.x.x</text>
  <text x="480" y="614" text-anchor="middle" fill="#5b8cff" font-size="9" opacity="0.7">WireGuard-based · Zero-config · Cross-NAT</text>

  <!-- ═══ L1: Phoenix Channel (center bus) ═══ -->
  <rect x="300" y="310" width="360" height="120" rx="6" fill="url(#nasGrad)" stroke="#00d9ff" stroke-width="1.5"/>
  <!-- Glow effect -->
  <rect x="300" y="310" width="360" height="120" rx="6" fill="none" stroke="#00d9ff" stroke-width="8" opacity="0.08"/>

  <text x="480" y="332" text-anchor="middle" fill="#00d9ff" font-size="9" font-weight="700" letter-spacing="3">L1 · PHOENIX CHANNEL BUS</text>

  <!-- Channel badge -->
  <rect x="362" y="340" width="236" height="20" rx="3" fill="#001a2e"/>
  <text x="480" y="354" text-anchor="middle" fill="#00d9ff" font-size="10" font-weight="700">work:LN-YYYYMMDD-XXX</text>

  <!-- Events row -->
  <rect x="315" y="368" width="80" height="15" rx="2" fill="#003344"/>
  <text x="355" y="379" text-anchor="middle" fill="#00d9ff" font-size="8">task.assign</text>
  <rect x="401" y="368" width="80" height="15" rx="2" fill="#003344"/>
  <text x="441" y="379" text-anchor="middle" fill="#00d9ff" font-size="8">task.result</text>
  <rect x="487" y="368" width="80" height="15" rx="2" fill="#003344"/>
  <text x="527" y="379" text-anchor="middle" fill="#00d9ff" font-size="8">task.progress</text>
  <rect x="573" y="368" width="72" height="15" rx="2" fill="#003344"/>
  <text x="609" y="379" text-anchor="middle" fill="#00d9ff" font-size="8">mailbox.post</text>

  <!-- State Store badge -->
  <rect x="340" y="392" width="140" height="28" rx="3" fill="#001829"/>
  <text x="410" y="406" text-anchor="middle" fill="#4dbbdd" font-size="8" font-weight="700">ETS StateStore</text>
  <text x="410" y="417" text-anchor="middle" fill="#4dbbdd" font-size="7" opacity="0.7">state · mailbox · work-keys</text>

  <rect x="490" y="392" width="140" height="28" rx="3" fill="#001829"/>
  <text x="560" y="406" text-anchor="middle" fill="#4dbbdd" font-size="8" font-weight="700">Phoenix.Presence</text>
  <text x="560" y="417" text-anchor="middle" fill="#4dbbdd" font-size="7" opacity="0.7">agent online/offline tracking</text>

  <!-- L1 label outside -->
  <text x="290" y="375" text-anchor="end" fill="#5b8cff" font-size="9" font-weight="700" letter-spacing="1">ws://</text>

