  <path d="M 690 220 Q 675 370 660 370" stroke="#ff8c42" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="665" y="300" fill="#ff8c42" font-size="8" font-weight="700">task.result</text>
  <text x="665" y="312" fill="#cc6622" font-size="7">task.progress</text>

