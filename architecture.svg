  <text x="480" y="118" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">HarnessServer.Endpoint</text>
  <text x="480" y="130" text-anchor="middle" fill="#8ab4ff" font-size="8">:4000  ·  WebSocket + REST</text>

  <!-- REST endpoints -->
  <text x="365" y="152" fill="#4dbbdd" font-size="8" font-weight="700">REST API</text>
  <text x="365" y="164" fill="#6cb4cc" font-size="7.5">GET  /api/health</text>
  <text x="365" y="175" fill="#6cb4cc" font-size="7.5">GET  /api/presence</text>
  <text x="365" y="186" fill="#6cb4cc" font-size="7.5">POST /api/work-keys</text>
  <text x="365" y="197" fill="#6cb4cc" font-size="7.5">GET  /api/work-keys/latest</text>
  <text x="365" y="208" fill="#6cb4cc" font-size="7.5">GET|PATCH /api/state/:wk</text>
  <text x="365" y="219" fill="#6cb4cc" font-size="7.5">GET|POST  /api/mailbox/:agent</text>

