  <text x="810" y="162" text-anchor="middle" fill="#cc8866" font-size="7.5">task.assign 수신 → 코드 작성</text>
  <text x="810" y="172" text-anchor="middle" fill="#cc8866" font-size="7.5">ARTIFACT: path 출력</text>

  <rect x="706" y="186" width="208" height="44" rx="3" fill="#1a0a00"/>
  <text x="810" y="202" text-anchor="middle" fill="#ff8c42" font-size="9" font-weight="700">agent-daemon (Bun)</text>
  <text x="810" y="214" text-anchor="middle" fill="#cc8866" font-size="7.5">task.result ← opencode stdout</text>
  <text x="810" y="224" text-anchor="middle" fill="#cc8866" font-size="7.5">ARTIFACT: 파싱</text>

  <rect x="706" y="238" width="208" height="28" rx="3" fill="#1a0a00"/>
  <text x="810" y="252" text-anchor="middle" fill="#ff8c42" font-size="8" font-weight="700">L3 · TTY session</text>
  <text x="810" y="263" text-anchor="middle" fill="#cc8866" font-size="7">spawn(opencode run ...)</text>

  <rect x="706" y="274" width="208" height="18" rx="2" fill="#1a0a00" stroke="#ff8c42" stroke-width="0.8"/>
  <text x="810" y="286" text-anchor="middle" fill="#ff8c42" font-size="8" font-weight="700">$ oah-agent ws://... builder</text>

