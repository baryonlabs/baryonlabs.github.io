  <path d="M 660 390 Q 675 420 690 250" stroke="#00d9ff" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-cyan)"/>
  <text x="660" y="356" fill="#00d9ff" font-size="8">task.assign</text>

