  <rect x="30" y="432" width="900" height="18" rx="3" fill="#001829" stroke="#00d9ff" stroke-width="0.6" opacity="0.5"/>
  <text x="480" y="444" text-anchor="middle" fill="#00d9ff" font-size="8" opacity="0.7" letter-spacing="2">L1 · PHOENIX PUBSUB BROADCAST DOMAIN · work:LN-YYYYMMDD-XXX</text>

