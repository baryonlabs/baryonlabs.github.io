  <text x="150" y="162" text-anchor="middle" fill="#88cc88" font-size="7.5">task.assign → task.result 조율</text>
  <text x="150" y="172" text-anchor="middle" fill="#88cc88" font-size="7.5">Work Key 발급 · approval gate</text>

  <!-- agent daemon -->
  <rect x="46" y="186" width="208" height="44" rx="3" fill="#001a0a"/>
  <text x="150" y="202" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="700">agent-daemon (Bun)</text>
  <text x="150" y="214" text-anchor="middle" fill="#88cc88" font-size="7.5">Phoenix 5-tuple protocol</text>
  <text x="150" y="224" text-anchor="middle" fill="#88cc88" font-size="7.5">heartbeat · reconnect</text>

