  <text x="534" y="174" text-anchor="middle" fill="#4dbbdd" font-size="7">join · handle_in</text>
  <text x="534" y="185" text-anchor="middle" fill="#4dbbdd" font-size="7">broadcast!</text>
  <text x="534" y="196" text-anchor="middle" fill="#4dbbdd" font-size="7">Presence.track</text>

