  <text x="490" y="298" fill="#00d9ff" font-size="7.5" opacity="0.8">phx_join</text>

  <!-- oah-server label -->
  <rect x="356" y="282" width="248" height="18" rx="2" fill="#002233" stroke="#00d9ff" stroke-width="0.8"/>
  <text x="480" y="294" text-anchor="middle" fill="#00d9ff" font-size="8" font-weight="700">$ oah-server</text>

