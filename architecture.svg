  <text x="75" y="326" text-anchor="middle" fill="#4466cc" font-size="7">file · DB · tools</text>

  <rect x="850" y="302" width="70" height="30" rx="3" fill="#0d1020" stroke="#5b8cff" stroke-width="0.8" opacity="0.7"/>
  <text x="885" y="315" text-anchor="middle" fill="#5b8cff" font-size="8" font-weight="700">L2 · MCP</text>
  <text x="885" y="326" text-anchor="middle" fill="#4466cc" font-size="7">file · DB · tools</text>

