<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OAH Dashboard — 에이전트 현황</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg:      #ffffff;
  --bg2:     #f8fafc;
  --bg3:     #f1f5f9;
  --border:  #e2e8f0;
  --border2: #cbd5e1;
  --text:    #1e293b;
  --text2:   #475569;
  --text3:   #94a3b8;
  --cyan:    #0284c7;
  --green:   #059669;
  --orange:  #ea580c;
  --purple:  #7c3aed;
  --red:     #dc2626;
  --amber:   #d97706;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.5;
}

.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
}
.nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: var(--text); text-decoration: none; }
.nav-logo span { color: var(--cyan); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-status { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text3); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
.status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
.status-dot.offline { background: var(--red); }
.status-dot.connecting { background: var(--amber); animation: pulse 1s infinite; }
#conn-label { color: var(--text2); }

.server-form { display: flex; align-items: center; gap: 8px; }
.server-input {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); font-family: inherit; font-size: 11px;
  padding: 5px 10px; border-radius: 4px; width: 220px;
  outline: none; transition: border-color 0.2s;
}
.server-input:focus { border-color: var(--cyan); }
.connect-btn {
  background: var(--cyan); border: none; color: #fff;
  font-family: inherit; font-size: 11px; font-weight: 700;
  padding: 5px 14px; border-radius: 4px; cursor: pointer;
  letter-spacing: 0.5px; transition: opacity 0.2s;
}
.connect-btn:hover { opacity: 0.85; }

/* MAIN GRID */
.dashboard-grid {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
  gap: 16px;
  padding: 20px 0 40px;
  min-height: calc(100vh - 52px);
}

/* PANELS */
.panel {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.panel-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; }
.panel-badge {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); font-size: 10px; padding: 1px 7px; border-radius: 10px;
}
.panel-body { padding: 12px; }

/* SIDEBAR */
.sidebar { display: flex; flex-direction: column; gap: 16px; grid-row: 1 / 3; }

/* AGENT CARD */
.agent-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg2);
  margin-bottom: 6px;
  transition: border-color 0.2s;
}
.agent-card:last-child { margin-bottom: 0; }
.agent-card.online { border-left: 3px solid var(--green); }
.agent-card.offline { border-left: 3px solid var(--border2); opacity: 0.6; }
.agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.agent-dot.green  { background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 2s infinite; }
.agent-dot.cyan   { background: var(--cyan); box-shadow: 0 0 5px var(--cyan); animation: pulse 2s infinite; }
.agent-dot.orange { background: var(--orange); box-shadow: 0 0 5px var(--orange); animation: pulse 2s infinite; }
.agent-dot.purple { background: var(--purple); box-shadow: 0 0 5px var(--purple); animation: pulse 2s infinite; }
.agent-dot.grey   { background: var(--border2); }
.agent-info { flex: 1; min-width: 0; }
.agent-name { font-size: 12px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-meta { font-size: 10px; color: var(--text3); margin-top: 1px; }
.role-chip {
  font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
  padding: 2px 6px; border-radius: 2px; white-space: nowrap;
}
.role-chip.orchestrator { background: rgba(2,132,199,0.1); color: var(--cyan); }
.role-chip.builder      { background: rgba(5,150,105,0.1); color: var(--green); }
.role-chip.verifier     { background: rgba(124,58,237,0.1); color: var(--purple); }
.role-chip.reviewer     { background: rgba(234,88,12,0.1); color: var(--orange); }
.role-chip.integrator   { background: rgba(217,119,6,0.1); color: var(--amber); }

/* WORK KEY ITEM */
.wk-item {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg2);
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.wk-item:last-child { margin-bottom: 0; }
.wk-item:hover { border-color: var(--border2); background: var(--bg3); }
.wk-item.active { border-color: var(--cyan); background: rgba(2,132,199,0.03); }
.wk-key { font-size: 12px; color: var(--cyan); }
.wk-meta { font-size: 10px; color: var(--text3); margin-top: 3px; }
.wk-status {
  display: inline-block; margin-top: 4px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
  padding: 1px 6px; border-radius: 2px;
}
.wk-status.active  { background: rgba(5,150,105,0.1); color: var(--green); }
.wk-status.idle    { background: var(--bg3); color: var(--text3); }
.wk-status.done    { background: rgba(2,132,199,0.1); color: var(--cyan); }

/* MAIN AREA */
.main-area { display: flex; flex-direction: column; gap: 16px; }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px;
}
.stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; }
.stat-num.green  { color: var(--green); }
.stat-num.cyan   { color: var(--cyan); }
.stat-num.orange { color: var(--orange); }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

/* EVENT LOG */
.log-body { padding: 0; max-height: 340px; overflow-y: auto; }
.log-entry {
  display: grid; grid-template-columns: 64px 100px 1fr;
  gap: 12px; align-items: baseline;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.log-entry:last-child { border-bottom: none; }
.log-entry:hover { background: var(--bg2); }
.log-time { color: var(--text3); font-size: 10px; }
.log-event { font-weight: 500; }
.log-event.task-assign   { color: var(--orange); }
.log-event.task-result   { color: var(--green); }
.log-event.task-progress { color: var(--cyan); }
.log-event.task-blocked  { color: var(--red); }
.log-event.agent-hello   { color: var(--green); }
.log-event.agent-bye     { color: var(--text3); }
.log-event.state-update  { color: var(--purple); }
.log-msg { color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* STATE PANEL */
.state-body { padding: 16px; }
.state-kv { display: grid; grid-template-columns: 140px 1fr; gap: 8px 16px; }
.state-k { font-size: 11px; color: var(--text3); }
.state-v { font-size: 11px; color: var(--text); word-break: break-all; }
.state-v.green  { color: var(--green); }
.state-v.cyan   { color: var(--cyan); }

/* EMPTY STATE */
.empty { padding: 32px 16px; text-align: center; color: var(--text3); font-size: 12px; }
.empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }

/* REFRESH INDICATOR */
.refresh-bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--border);
  z-index: 200;
}
.refresh-progress {
  height: 100%; background: var(--cyan);
  transition: width linear;
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.2s ease both; }

@media (max-width: 900px) {
  .dashboard-grid { grid-template-columns: 1fr; grid-template-rows: auto; }
  .sidebar { grid-row: auto; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav>
  <div class="container">
    <div class="nav-inner">
      <a href="/" class="nav-logo">oah<span>://</span><span style="font-size:11px;font-weight:400;color:var(--text3);"> dashboard</span></a>
      <div class="nav-right">
        <div class="nav-status">
          <div class="status-dot" id="status-dot"></div>
          <span id="conn-label">연결 안 됨</span>
        </div>
        <div class="server-form">
          <input class="server-input" id="server-url" type="text" placeholder="http://localhost:4000" value="http://localhost:4000"/>
          <button class="connect-btn" onclick="connectServer()">연결</button>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="container">
  <div class="dashboard-grid">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <!-- AGENTS -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">온라인 에이전트</span>
          <span class="panel-badge" id="agent-count">0</span>
        </div>
        <div class="panel-body" id="agent-list">
          <div class="empty"><div class="empty-icon">🤖</div>서버에 연결하면<br/>에이전트 목록이 표시됩니다</div>
        </div>
      </div>

      <!-- WORK KEYS -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Work Keys</span>
          <span class="panel-badge" id="wk-count">0</span>
        </div>
        <div class="panel-body" id="wk-list">
          <div class="empty"><div class="empty-icon">🔑</div>활성 Work Key 없음</div>
        </div>
      </div>
    </div>

    <!-- MAIN AREA -->
    <div class="main-area">

      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num green" id="stat-online">0</div>
          <div class="stat-label">온라인 에이전트</div>
        </div>
        <div class="stat-card">
          <div class="stat-num cyan" id="stat-wk">0</div>
          <div class="stat-label">Work Keys</div>
        </div>
        <div class="stat-card">
          <div class="stat-num orange" id="stat-tasks">0</div>
          <div class="stat-label">완료된 태스크</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-uptime">—</div>
          <div class="stat-label">마지막 업데이트</div>
        </div>
      </div>

      <!-- SELECTED WK STATE -->
      <div class="panel" id="state-panel" style="display:none;">
        <div class="panel-header">
          <span class="panel-title">Work Key 상태</span>
          <span class="panel-badge" id="state-wk-label">—</span>
        </div>
        <div class="state-body" id="state-body">
          <div class="empty">상태 없음</div>
        </div>
      </div>

      <!-- EVENT LOG -->
      <div class="panel" style="flex:1;">
        <div class="panel-header">
          <span class="panel-title">이벤트 로그</span>
          <span class="panel-badge" id="log-count">0</span>
        </div>
        <div class="log-body" id="log-body">
          <div class="empty" id="log-empty"><div class="empty-icon">📋</div>이벤트 대기 중...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- REFRESH BAR -->
<div class="refresh-bar"><div class="refresh-progress" id="refresh-bar" style="width:0%"></div></div>

<script>
const POLL_INTERVAL = 3000; // 3초
let serverUrl = '';
let pollTimer = null;
let progressTimer = null;
let selectedWk = null;
let eventLog = [];
let taskCount = 0;
let connected = false;

const roleColors = {
  orchestrator: 'cyan',
  builder: 'green',
  verifier: 'purple',
  reviewer: 'orange',
  integrator: 'orange',
};

function fmt(role) {
  return `<span class="role-chip ${role}">${role}</span>`;
}

function agentDotColor(role) {
  return roleColors[role] || 'grey';
}

function setStatus(state, label) {
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('conn-label');
  dot.className = `status-dot ${state}`;
  lbl.textContent = label;
}

function connectServer() {
  const url = document.getElementById('server-url').value.trim().replace(/\/$/, '');
  if (!url) return;
  serverUrl = url;
  setStatus('connecting', '연결 중...');
  if (pollTimer) clearInterval(pollTimer);
  poll();
  pollTimer = setInterval(poll, POLL_INTERVAL);
  startProgressBar();
}

async function poll() {
  if (!serverUrl) return;
  try {
    const [presRes, wkRes] = await Promise.all([
      fetch(`${serverUrl}/api/presence`, { signal: AbortSignal.timeout(4000) }),
      fetch(`${serverUrl}/api/work-keys`, { signal: AbortSignal.timeout(4000) }),
    ]);

    if (!presRes.ok || !wkRes.ok) throw new Error('HTTP error');

    const presence = await presRes.json();
    const wkData = await wkRes.json();

    if (!connected) {
      connected = true;
      setStatus('online', `연결됨 · ${serverUrl}`);
      addLog('system', '서버 연결 성공');
    }

    renderAgents(presence.agents || []);
    renderWorkKeys(wkData.work_keys || []);
    document.getElementById('stat-uptime').textContent = new Date().toLocaleTimeString('ko', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    if (selectedWk) loadWkState(selectedWk);

  } catch (e) {
    if (connected) {
      connected = false;
      addLog('error', `연결 끊김: ${e.message}`);
    }
    setStatus('offline', '연결 실패');
    renderAgents([]);
  }
}

function renderAgents(agents) {
  const list = document.getElementById('agent-list');
  document.getElementById('agent-count').textContent = agents.length;
  document.getElementById('stat-online').textContent = agents.length;

  if (agents.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🤖</div>온라인 에이전트 없음</div>';
    return;
  }

  list.innerHTML = agents.map(a => {
    const role = (a.role || 'builder').toLowerCase();
    const color = agentDotColor(role);
    const machine = a.machine || a.hostname || '';
    return `
      <div class="agent-card online fade-in">
        <div class="agent-dot ${color}"></div>
        <div class="agent-info">
          <div class="agent-name">${esc(a.name || a.agent || '?')}</div>
          <div class="agent-meta">${machine}</div>
        </div>
        ${fmt(role)}
      </div>`;
  }).join('');
}

function renderWorkKeys(wks) {
  const list = document.getElementById('wk-list');
  document.getElementById('wk-count').textContent = wks.length;
  document.getElementById('stat-wk').textContent = wks.length;

  if (wks.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔑</div>활성 Work Key 없음</div>';
    return;
  }

  if (!selectedWk && wks.length > 0) selectedWk = wks[0];

  list.innerHTML = wks.map(wk => {
    const active = wk === selectedWk;
    return `
      <div class="wk-item ${active ? 'active' : ''} fade-in" onclick="selectWk('${esc(wk)}')">
        <div class="wk-key">${esc(wk)}</div>
        <div class="wk-meta">클릭해서 상태 확인</div>
      </div>`;
  }).join('');

  if (selectedWk && wks.includes(selectedWk)) loadWkState(selectedWk);
  else if (wks.length > 0) loadWkState(wks[0]);
}

function selectWk(wk) {
  selectedWk = wk;
  renderWorkKeys(Array.from(document.querySelectorAll('.wk-item')).map(el => el.querySelector('.wk-key').textContent));
  loadWkState(wk);
}

async function loadWkState(wk) {
  if (!serverUrl) return;
  try {
    const res = await fetch(`${serverUrl}/api/state/${encodeURIComponent(wk)}`, { signal: AbortSignal.timeout(3000) });
    if (!res.ok) return;
    const data = await res.json();
    const state = data.state || data || {};

    document.getElementById('state-panel').style.display = '';
    document.getElementById('state-wk-label').textContent = wk;

    const body = document.getElementById('state-body');
    const entries = Object.entries(state);
    if (entries.length === 0) {
      body.innerHTML = '<div class="empty">상태 데이터 없음</div>';
      return;
    }
    body.innerHTML = `<div class="state-kv">${
      entries.map(([k, v]) => {
        const vStr = typeof v === 'object' ? JSON.stringify(v) : String(v);
        const cls = v === 'done' || v === 'completed' ? 'green' : v === 'active' || v === 'running' ? 'cyan' : '';
        return `<div class="state-k">${esc(k)}</div><div class="state-v ${cls}">${esc(vStr)}</div>`;
      }).join('')
    }</div>`;

    // Count tasks from state
    const tasks = state.tasks || state.completed_tasks;
    if (Array.isArray(tasks)) {
      document.getElementById('stat-tasks').textContent = tasks.filter(t => t.status === 'done' || t.done).length;
    }
  } catch {}
}

function addLog(event, msg) {
  const now = new Date();
  const time = now.toLocaleTimeString('ko', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  eventLog.unshift({ time, event, msg });
  if (eventLog.length > 200) eventLog.pop();

  const body = document.getElementById('log-body');
  const empty = document.getElementById('log-empty');
  if (empty) empty.remove();

  const cls = event.replace('.', '-').replace('_', '-');
  const entry = document.createElement('div');
  entry.className = 'log-entry fade-in';
  entry.innerHTML = `
    <span class="log-time">${time}</span>
    <span class="log-event ${cls}">${esc(event)}</span>
    <span class="log-msg">${esc(msg)}</span>`;
  body.prepend(entry);

  document.getElementById('log-count').textContent = eventLog.length;
  if (eventLog.length > 200) body.lastElementChild?.remove();
}

function startProgressBar() {
  if (progressTimer) clearInterval(progressTimer);
  const bar = document.getElementById('refresh-bar');
  let pct = 0;
  const step = 100 / (POLL_INTERVAL / 50);
  bar.style.transition = '';
  progressTimer = setInterval(() => {
    pct += step;
    if (pct >= 100) pct = 0;
    bar.style.width = pct + '%';
  }, 50);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// WebSocket connection for real-time events (Phoenix Channel)
let ws = null;
let heartbeatTimer = null;
let ref = 1;

function connectWs() {
  if (!serverUrl) return;
  const wsUrl = serverUrl.replace(/^http/, 'ws') + '/socket/websocket?vsn=2.0.0';
  try {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      // Join lobby channel for system-wide events
      const wk = selectedWk || '_dashboard';
      const joinMsg = JSON.stringify(['1', String(ref++), `work:${wk}`, 'phx_join', { role: 'observer', agent: 'dashboard' }]);
      ws.send(joinMsg);
      // heartbeat
      heartbeatTimer = setInterval(() => {
        ws.send(JSON.stringify([null, String(ref++), 'phoenix', 'heartbeat', {}]));
      }, 30000);
    };
    ws.onmessage = (evt) => {
      try {
        const [, , topic, event, payload] = JSON.parse(evt.data);
        if (event === 'phx_reply' || event === 'heartbeat') return;
        const msg = payload?.message || payload?.task_id || payload?.agent || JSON.stringify(payload).slice(0, 80);
        addLog(event, `[${topic}] ${msg}`);
        if (event === 'task.result') {
          const cur = parseInt(document.getElementById('stat-tasks').textContent) || 0;
          document.getElementById('stat-tasks').textContent = cur + 1;
        }
      } catch {}
    };
    ws.onclose = () => {
      clearInterval(heartbeatTimer);
      setTimeout(connectWs, 5000); // reconnect
    };
    ws.onerror = () => ws.close();
  } catch {}
}

// Auto-connect if hash provided: dashboard.html#http://server:4000
const hashUrl = location.hash.slice(1);
if (hashUrl.startsWith('http')) {
  document.getElementById('server-url').value = hashUrl;
  connectServer();
  connectWs();
}

// Also start polling on page load with default if already set
document.getElementById('server-url').addEventListener('keydown', e => {
  if (e.key === 'Enter') { connectServer(); connectWs(); }
});

document.querySelector('.connect-btn').addEventListener('click', connectWs, { once: false });
</script>

</body>
</html>
